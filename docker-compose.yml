# Run the Codebase Architect web dashboard + REST API:
#   docker compose up --build -d
#
# Access model (see docs/DEPLOY.md): everything over the tailnet by IP:port.
# Bind the app to this host's Tailscale IP so it is reachable from any tailnet
# device — and nowhere else:
#   echo 'BIND_ADDR=100.83.238.95' >> .env && docker compose up -d
#   then open http://<tailscale-ip>:47800/
# Default bind is 127.0.0.1 (host-only). Never use 0.0.0.0 (that is public).
#
# To scan a local project, mount it (see the commented volume) and use its
# in-container path as the scan "Source".
services:
  api:
    build: .
    image: codebase-architect
    ports:
      # Host bind = BIND_ADDR:HOST_PORT -> container 47800. Set BIND_ADDR to the
      # Tailscale IP for tailnet IP:port access. Defaults to
      # 127.0.0.1:47800 (host-only). To reach it "without a port" on your
      # tailnet alongside other services, e.g. BIND_ADDR=<tailscale-ip>
      # HOST_PORT=80. Tailscale Serve also works with the default bind.
      - "${BIND_ADDR:-127.0.0.1}:${HOST_PORT:-47800}:47800"
    environment:
      CA_AI__DEFAULT_PROVIDER: ${CA_AI__DEFAULT_PROVIDER:-claude}
      # Provide a key to enable the AI narrative; without it scans run static-only.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ca-data:/data
      - ca-workspaces:/workspaces
      # Mount a project to scan it (read-only), then use "/scan/<name>" as the Source:
      # - ./myproject:/scan/myproject:ro
    restart: unless-stopped

  # Persistence services for later phases (DB + queue). The app currently keeps
  # scan state in memory, so these are opt-in and also use non-standard ports:
  #   docker compose --profile full up -d
  postgres:
    image: postgres:16-alpine
    profiles: ["full"]
    environment:
      POSTGRES_USER: architect
      POSTGRES_PASSWORD: architect
      POSTGRES_DB: architect
    ports:
      - "127.0.0.1:45432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U architect"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: ["full"]
    ports:
      - "127.0.0.1:46379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ca-data:
  ca-workspaces:
  pgdata:
