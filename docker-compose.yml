# Development services for phases that need persistence / async workers
# (API + workers, F6+). The core CLI scan does not require these.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: architect
      POSTGRES_PASSWORD: architect
      POSTGRES_DB: architect
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U architect"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
