name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Create venv and install
        run: |
          uv venv --python 3.11 .venv
          uv pip install --python .venv/bin/python -e '.[dev,cli,api]'
          uv pip install --python .venv/bin/python -e plugins/html_site

      - name: Lint (ruff)
        run: .venv/bin/ruff check src tests plugins

      - name: Types (mypy)
        run: .venv/bin/mypy

      - name: Architecture (import-linter)
        run: .venv/bin/lint-imports

      - name: Tests (pytest)
        run: .venv/bin/pytest
